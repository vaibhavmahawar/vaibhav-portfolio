<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_9 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_9" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_9');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create a futuristic "AI Core" geometry
const group = new THREE.Group();
scene.add(group);

const coreGeom = new THREE.IcosahedronGeometry(1, 1);
const coreMat = new THREE.MeshPhongMaterial({
    color: 0x00f5ff,
    wireframe: true,
    transparent: true,
    opacity: 0.4,
    emissive: 0x00f5ff,
    emissiveIntensity: 0.5
});
const core = new THREE.Mesh(coreGeom, coreMat);
group.add(core);

const outerGeom = new THREE.IcosahedronGeometry(1.5, 0);
const outerMat = new THREE.MeshPhongMaterial({
    color: 0x00ffb3,
    wireframe: true,
    transparent: true,
    opacity: 0.1,
});
const outer = new THREE.Mesh(outerGeom, outerMat);
group.add(outer);

// Add particles for "data flow"
const pointsGeom = new THREE.BufferGeometry();
const pointsCount = 200;
const coords = new Float32Array(pointsCount * 3);
for (let i = 0; i < pointsCount * 3; i++) {
    coords[i] = (Math.random() - 0.5) * 6;
}
pointsGeom.setAttribute('position', new THREE.BufferAttribute(coords, 3));
const pointsMat = new THREE.PointsMaterial({ color: 0x00f5ff, size: 0.03, transparent: true, opacity: 0.6 });
const points = new THREE.Points(pointsGeom, pointsMat);
group.add(points);

const light = new THREE.PointLight(0x00f5ff, 1, 100);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 4;

function animate(t) {
    requestAnimationFrame(animate);
    group.rotation.y += 0.002;
    group.rotation.x += 0.001;
    
    // Pulsing effect
    const s = 1 + Math.sin(t * 0.001) * 0.05;
    core.scale.set(s, s, s);
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate(0);
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_9 -->
</body>
</html>
