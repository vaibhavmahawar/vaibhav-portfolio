<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="VKM">
  <defs>
    <linearGradient id="vkm-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ff2f8" />
      <stop offset="100%" stop-color="#00dce5" />
    </linearGradient>
  </defs>

  <!-- Dark mission-control panel -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12" fill="#0a0a0a" stroke="#00dce5" stroke-opacity="0.5" stroke-width="2" />

  <!-- Corner node accents -->
  <circle cx="9" cy="9" r="1.6" fill="#00dce5" fill-opacity="0.8" />
  <circle cx="55" cy="55" r="1.6" fill="#00dce5" fill-opacity="0.8" />

  <!-- VKM monogram -->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="central"
        font-family="'JetBrains Mono', ui-monospace, 'Courier New', monospace"
        font-size="24" font-weight="700" letter-spacing="-1.5"
        fill="url(#vkm-stroke)">VKM</text>
</svg>
